<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Test Case Generator</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #273449;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --high: #ef4444;
      --medium: #f59e0b;
      --low: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }
    h1 { font-size: 1.6rem; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 28px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    label { display: block; font-weight: 600; margin: 14px 0 6px; font-size: 0.92rem; }
    label .req { color: var(--high); }
    .hint { color: var(--muted); font-weight: 400; font-size: 0.8rem; }
    textarea, input {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      resize: vertical;
    }
    textarea:focus, input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 20px; flex-wrap: wrap; }
    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    button.secondary { background: var(--panel-2); border: 1px solid var(--border); }
    button.secondary:hover:not(:disabled) { background: var(--border); }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -3px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      margin-top: 18px; padding: 12px 14px; border-radius: 8px;
      background: rgba(239,68,68,0.12); border: 1px solid var(--high); color: #fecaca;
    }
    .results { margin-top: 32px; }
    .results-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .results-head h2 { margin: 0; font-size: 1.2rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    ol { margin: 0; padding-left: 18px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.74rem; font-weight: 700; }
    .p-High { background: rgba(239,68,68,0.18); color: #fca5a5; }
    .p-Medium { background: rgba(245,158,11,0.18); color: #fcd34d; }
    .p-Low { background: rgba(34,197,94,0.18); color: #86efac; }
    .type { color: var(--muted); font-size: 0.8rem; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--low); color: #052e16; font-weight: 600;
      padding: 10px 18px; border-radius: 8px; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🧪 Manual Test Case Generator</h1>
    <p class="sub">Describe a feature and let Claude draft your manual test cases.</p>

    <div class="card">
      <label for="short">Short Description <span class="req">*</span></label>
      <input id="short" placeholder="e.g. User can reset password via email" />

      <label for="desc">Description <span class="hint">(optional)</span></label>
      <textarea id="desc" rows="4" placeholder="Fuller context about the feature, flows, constraints..."></textarea>

      <label for="ac">Acceptance Criteria <span class="hint">(optional, one per line)</span></label>
      <textarea id="ac" rows="6" placeholder="- Given a registered email, a reset link is sent&#10;- Link expires after 30 minutes&#10;- Password must be at least 8 characters"></textarea>

      <div class="row">
        <button id="generate">Generate Test Cases</button>
      </div>

      <div id="error" class="error hidden"></div>
    </div>

    <div id="results" class="results hidden">
      <div class="results-head">
        <h2>Test Cases <span id="count" class="type"></span></h2>
        <div class="row" style="margin:0;">
          <button class="secondary" id="copy">📋 Copy</button>
          <button class="secondary" id="csv">⬇️ Download CSV</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Title</th><th>Preconditions</th><th>Steps</th>
              <th>Expected Result</th><th>Priority</th><th>Type</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    let currentCases = [];

    function showToast(msg) {
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1800);
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    function render(cases) {
      const tbody = $("tbody");
      tbody.innerHTML = "";
      cases.forEach((tc) => {
        const steps = Array.isArray(tc.steps) ? tc.steps : [tc.steps];
        const priority = ["High", "Medium", "Low"].includes(tc.priority) ? tc.priority : "Medium";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${esc(tc.id)}</td>
          <td>${esc(tc.title)}</td>
          <td>${esc(tc.preconditions)}</td>
          <td><ol>${steps.map((s) => `<li>${esc(s)}</li>`).join("")}</ol></td>
          <td>${esc(tc.expectedResult)}</td>
          <td><span class="badge p-${priority}">${esc(priority)}</span></td>
          <td class="type">${esc(tc.type)}</td>`;
        tbody.appendChild(tr);
      });
      $("count").textContent = `(${cases.length})`;
      $("results").classList.remove("hidden");
    }

    async function generate() {
      const btn = $("generate");
      const errBox = $("error");
      errBox.classList.add("hidden");

      const payload = {
        short_description: $("short").value,
        description: $("desc").value,
        acceptance_criteria: $("ac").value,
      };
      if (!payload.short_description.trim()) {
        errBox.textContent = "Short Description is required.";
        errBox.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Generating...';
      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed");
        currentCases = data.testCases || [];
        render(currentCases);
      } catch (e) {
        errBox.textContent = e.message;
        errBox.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.textContent = "Generate Test Cases";
      }
    }

    function toMarkdown(cases) {
      const head = "| ID | Title | Preconditions | Steps | Expected Result | Priority | Type |";
      const sep = "|---|---|---|---|---|---|---|";
      const rows = cases.map((tc) => {
        const steps = (Array.isArray(tc.steps) ? tc.steps : [tc.steps])
          .map((s, i) => `${i + 1}. ${s}`).join("<br>");
        return `| ${tc.id} | ${tc.title} | ${tc.preconditions} | ${steps} | ${tc.expectedResult} | ${tc.priority} | ${tc.type} |`;
      });
      return [head, sep, ...rows].join("\n");
    }

    function csvCell(v) {
      const s = String(v ?? "");
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }

    function toCSV(cases) {
      const header = ["ID", "Title", "Preconditions", "Steps", "Expected Result", "Priority", "Type"];
      const rows = cases.map((tc) => {
        const steps = (Array.isArray(tc.steps) ? tc.steps : [tc.steps])
          .map((s, i) => `${i + 1}. ${s}`).join("\n");
        return [tc.id, tc.title, tc.preconditions, steps, tc.expectedResult, tc.priority, tc.type]
          .map(csvCell).join(",");
      });
      return [header.join(","), ...rows].join("\n");
    }

    $("generate").addEventListener("click", generate);

    $("copy").addEventListener("click", async () => {
      await navigator.clipboard.writeText(toMarkdown(currentCases));
      showToast("Copied to clipboard");
    });

    $("csv").addEventListener("click", () => {
      const blob = new Blob([toCSV(currentCases)], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "test-cases.csv";
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
